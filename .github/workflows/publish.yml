name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish via Trusted Publishing
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/polymarket-execution
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION"
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME matches version $PKG_VERSION"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
